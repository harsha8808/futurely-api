<!--
  ================================================================
  FUTURELY — AUTH FIXES (Patch for index.html)
  ================================================================
  CHANGES vs original:
  1.  Added .auth-error CSS    → inline red error msg (no more alert())
  2.  Added .auth-timer CSS    → gold countdown on PIN step
  3.  Added .shake CSS         → input shake animation on wrong PIN
  4.  Auth modal HTML          → error divs + resend + timer elements
  5.  requestPin()             → inline error, no alert()
  6.  verifyPin()              → inline error + shake, no alert()
  7.  showPinStep()            → starts 10-min countdown
  8.  resendPin()              → resend link on PIN step
  9.  startPinTimer()          → countdown HH:MM display
  ================================================================
  HOW TO USE:
  Copy the CSS block into <style> in index.html (before </style>)
  Replace the auth modal HTML and inline <script> with versions below.
  ================================================================
-->

<!-- ============================================================
     1.  ADD THIS CSS inside the <style> block (before </style>)
     ============================================================ -->
<style id="auth-fix-css-to-add">
  /* Auth error message */
  .auth-error {
    color: #e05c5c;
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    min-height: 1.4rem;
    margin-top: -1rem;
    margin-bottom: 1rem;
    text-align: left;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .auth-error.visible { opacity: 1; }

  /* PIN countdown timer */
  .auth-timer {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    color: var(--gold-dim);
    margin-bottom: 1.2rem;
    text-align: center;
  }
  .auth-timer span { color: var(--gold-bright); }

  /* Resend link */
  .auth-resend {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    color: var(--navy-muted);
    text-align: center;
    margin-top: 1rem;
    cursor: none;
  }
  .auth-resend button {
    background: none; border: none; padding: 0;
    color: var(--gold-dim); text-decoration: underline;
    font-family: inherit; font-size: inherit;
    letter-spacing: inherit; cursor: none;
    transition: color 0.2s;
  }
  .auth-resend button:hover { color: var(--gold-bright); }

  /* Shake animation for wrong PIN */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-5px); }
    80%      { transform: translateX(5px); }
  }
  .shake { animation: shake 0.4s ease; }
</style>


<!-- ============================================================
     2.  REPLACE the <!-- AUTH OVERLAY --> section in index.html
         with this block
     ============================================================ -->
<div class="auth-overlay" id="authOverlay">

  <!-- STEP 1: Email -->
  <div class="auth-card" id="authEmailStep">
    <p class="sidebar-section-title" style="margin-bottom:1.5rem; color:var(--gold-bright); font-family:'DM Mono'; font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase;">
      Enter your email to enter
    </p>
    <input
      type="email"
      class="auth-input"
      id="authEmail"
      placeholder="your@email.com"
      autocomplete="email"
      onkeydown="if(event.key==='Enter') requestPin()"
    >
    <div class="auth-error" id="emailError"></div>
    <button class="btn-auth" id="emailBtn" onclick="requestPin()">Request Access Pin</button>
    <p class="hero-note" style="margin-top:1.5rem; cursor:pointer;" onclick="closeAuth()">Close</p>
  </div>

  <!-- STEP 2: PIN -->
  <div class="auth-card" id="authPinStep" style="display:none;">
    <p class="sidebar-section-title" style="margin-bottom:0.5rem; color:var(--gold-bright); font-family:'DM Mono'; font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase;">
      Enter the 6-digit pin
    </p>
    <div class="auth-timer" id="pinTimer">Pin expires in <span id="pinCountdown">10:00</span></div>
    <p class="hero-note" style="margin-bottom:1.2rem; opacity:0.6; font-size:0.5rem;">(Don't see it? Check your spam folder)</p>
    <input
      type="text"
      class="auth-input"
      id="authPin"
      placeholder="123456"
      maxlength="6"
      inputmode="numeric"
      pattern="[0-9]*"
      onkeydown="if(event.key==='Enter') verifyPin()"
    >
    <div class="auth-error" id="pinError"></div>
    <button class="btn-auth" id="pinBtn" onclick="verifyPin()">Open the Vault</button>
    <div class="auth-resend">
      Didn't get it?
      <button onclick="resendPin()" id="resendBtn">Resend Pin</button>
    </div>
    <p class="hero-note" style="margin-top:1rem; cursor:pointer;" onclick="showEmailStep()">← Back</p>
  </div>

</div>


<!-- ============================================================
     3.  REPLACE the inline <script> block in index.html
         (keep the cursor and scroll reveal parts, only replace auth logic)
     ============================================================ -->
<script src="auth.js"></script>
<script>
  const auth = window.FuturelyAuth;

  // --- Dynamic Nav & Hero ---
  function updateUI() {
    if (auth.isLoggedIn()) {
      const ctaRow = document.querySelector('.hero-cta-row');
      ctaRow.innerHTML = `
        <a href="futurely-composer.html" class="btn-primary">Write a New Letter</a>
        <a href="futurely-vault.html" class="hero-note" style="text-decoration:underline;">Dashboard →</a>
      `;
      document.querySelector('.nav-tag').innerHTML =
        `<a href="futurely-vault.html" style="color:inherit; text-decoration:none;">Dashboard</a>`;
    }
  }
  updateUI();

  // ── Auth overlay ──────────────────────────────────────────────
  function openAuth() {
    document.getElementById('authOverlay').classList.add('active');
    setTimeout(() => document.getElementById('authEmail').focus(), 300);
  }
  function closeAuth() {
    document.getElementById('authOverlay').classList.remove('active');
    clearError('emailError');
    clearError('pinError');
    stopPinTimer();
  }

  // ── Error helpers ─────────────────────────────────────────────
  function showError(id, msg) {
    const el = document.getElementById(id);
    el.style.color = ''; // Reset to default (red)
    el.textContent = msg;
    el.classList.add('visible');
  }
  function clearError(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.style.color = '';
    el.textContent = '';
    el.classList.remove('visible');
  }

  // ── PIN countdown timer ───────────────────────────────────────
  let _timerInterval = null;
  function startPinTimer() {
    stopPinTimer();
    let secs = 10 * 60; // 10 min = 600 s
    const el = document.getElementById('pinCountdown');
    function tick() {
      if (secs <= 0) {
        el.textContent = '00:00';
        stopPinTimer();
        showError('pinError', 'Pin expired — please go back and request a new one.');
        document.getElementById('pinBtn').disabled = true;
        return;
      }
      const m = String(Math.floor(secs / 60)).padStart(2, '0');
      const s = String(secs % 60).padStart(2, '0');
      el.textContent = `${m}:${s}`;
      secs--;
    }
    tick();
    _timerInterval = setInterval(tick, 1000);
  }
  function stopPinTimer() {
    if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
  }

  // ── Step navigation ───────────────────────────────────────────
  function showEmailStep() {
    document.getElementById('authEmailStep').style.display = 'block';
    document.getElementById('authPinStep').style.display   = 'none';
    stopPinTimer();
    clearError('pinError');
    const pinBtn = document.getElementById('pinBtn');
    pinBtn.disabled = false;
    pinBtn.textContent = 'Open the Vault';
  }
  function showPinStep() {
    document.getElementById('authEmailStep').style.display = 'none';
    document.getElementById('authPinStep').style.display   = 'block';
    document.getElementById('authPin').value = '';
    document.getElementById('pinBtn').disabled = false;
    document.getElementById('pinBtn').textContent = 'Open the Vault';
    clearError('pinError');
    startPinTimer();
    setTimeout(() => document.getElementById('authPin').focus(), 100);
  }

  // ── Request PIN ───────────────────────────────────────────────
  async function requestPin() {
    const email = document.getElementById('authEmail').value.trim();
    const btn   = document.getElementById('emailBtn');
    clearError('emailError');

    // Front-end email validation
    if (!email) {
      showError('emailError', 'Please enter your email address.');
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showError('emailError', 'That doesn\'t look like a valid email.');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Sending…';

    try {
      const res = await auth.requestPin(email);
      if (res.success) {
        showPinStep();
      } else {
        showError('emailError', res.error || 'Failed to send pin. Please try again.');
        btn.disabled    = false;
        btn.textContent = 'Request Access Pin';
      }
    } catch (e) {
      showError('emailError', 'Network error — please check your connection.');
      btn.disabled    = false;
      btn.textContent = 'Request Access Pin';
    }
  }

  // ── Verify PIN ────────────────────────────────────────────────
  async function verifyPin() {
    const email  = document.getElementById('authEmail').value.trim();
    const pin    = document.getElementById('authPin').value.trim();
    const btn    = document.getElementById('pinBtn');
    const input  = document.getElementById('authPin');
    clearError('pinError');

    if (!pin) {
      showError('pinError', 'Please enter the 6-digit pin from your email.');
      return;
    }
    if (pin.length !== 6 || !/^\d{6}$/.test(pin)) {
      showError('pinError', 'Pin must be exactly 6 digits.');
      input.classList.add('shake');
      setTimeout(() => input.classList.remove('shake'), 500);
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Verifying…';

    try {
      const res = await auth.verifyPin(email, pin);
      if (res.success) {
        stopPinTimer();
        window.location.href = 'futurely-vault.html';
      } else {
        // Show error inline — NO alert()
        const msg = res.error || 'Invalid or expired pin. Please try again.';
        showError('pinError', msg);
        input.value = '';
        input.classList.add('shake');
        setTimeout(() => input.classList.remove('shake'), 500);
        btn.disabled    = false;
        btn.textContent = 'Open the Vault';
        setTimeout(() => input.focus(), 100);
      }
    } catch (e) {
      showError('pinError', 'Network error — please check your connection.');
      btn.disabled    = false;
      btn.textContent = 'Open the Vault';
    }
  }

  // ── Resend PIN ────────────────────────────────────────────────
  async function resendPin() {
    const email      = document.getElementById('authEmail').value.trim();
    const resendBtn  = document.getElementById('resendBtn');
    clearError('pinError');
    resendBtn.disabled    = true;
    resendBtn.textContent = 'Sending…';

    try {
      const res = await auth.requestPin(email);
      if (res.success) {
        showError('pinError', '✓ New pin sent to ' + email);
        document.getElementById('pinError').style.color = 'var(--gold-dim)'; 
        document.getElementById('pinBtn').disabled = false;
        document.getElementById('pinBtn').textContent = 'Open the Vault';
        setTimeout(() => {
          const el = document.getElementById('pinError');
          if (el && el.textContent.includes('✓')) {
            clearError('pinError');
          }
        }, 4000);
      } else {
        showError('pinError', res.error || 'Failed to resend. Please try again.');
      }
    } catch(e) {
      showError('pinError', 'Network error — please check your connection.');
    }

    setTimeout(() => {
      resendBtn.disabled    = false;
      resendBtn.textContent = 'Resend Pin';
    }, 10000); // rate-limit resend button: 10s cooldown
  }

  // ── Custom cursor ─────────────────────────────────────────────
  const cursor = document.getElementById('cursor');
  const ring   = document.getElementById('cursorRing');
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
  function animateCursor() {
    cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
    rx += (mx - rx) * 0.12; ry += (my - ry) * 0.12;
    ring.style.left  = rx + 'px'; ring.style.top  = ry + 'px';
    requestAnimationFrame(animateCursor);
  }
  animateCursor();

  // ── Scroll reveal ─────────────────────────────────────────────
  const reveals = document.querySelectorAll('.reveal');
  const io = new IntersectionObserver((entries) => {
    entries.forEach((e, i) => {
      if (e.isIntersecting) {
        setTimeout(() => e.target.classList.add('visible'), i * 80);
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.12 });
  reveals.forEach(el => io.observe(el));
</script>
