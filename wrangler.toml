name = "futurely-backend"
main = "src/index.js"
compatibility_date = "2024-01-01"
route = "api.futurely.unbeated.com/*"
workers_dev = true

# D1 Database
[[d1_databases]]
binding       = "DB"
database_name = "futurely-db1"
database_id   = "2d2f6a6d-9bae-4e32-97f8-36c41ef8ccc5"

# Cron — delivery check every day at 8am UTC
[triggers]
crons = ["0 8 * * *"]

# Public env vars
[vars]
ENVIRONMENT = "production"
CORS_ORIGIN = "https://futurely.unbeated.com"
FROM_EMAIL  = "Futurely <letters@futurely.unbeated.com>"

# Secrets — set once via CLI, never commit to git:
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put TELEGRAM_BOT_TOKEN
